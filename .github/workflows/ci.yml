name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Enforce bundle and font budgets
        run: node scripts/check-performance-budget.mjs

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Portfolio end-to-end tests
        run: npm run test:e2e:portfolio

      - name: Production rendering tests
        run: npm run test:e2e:rendering

      - name: Accessibility and theme contrast tests
        run: npm run test:e2e:a11y

      - name: Runtime performance tests
        run: npm run test:e2e:performance

      - name: Upload required Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: required-playwright-report
          path: test-results/
          retention-days: 7
