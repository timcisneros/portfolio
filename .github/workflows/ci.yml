name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Portfolio end-to-end tests
        run: npm run test:e2e:portfolio

      - name: Accessibility and theme contrast tests
        run: npm run test:e2e:a11y

      - name: Upload required Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: required-playwright-report
          path: test-results/
          retention-days: 7

      # The camera/headline renderer is a retained experimental subsystem. Its
      # audit remains visible on every change, but software/WebGPU readiness can
      # vary across GitHub's headless runners and does not block portfolio
      # content, navigation, résumé, or contact delivery.
      - name: Rendering subsystem audit
        id: rendering-audit
        continue-on-error: true
        run: npm run test:e2e:rendering

      - name: Upload rendering audit report
        if: ${{ always() && steps.rendering-audit.outcome == 'failure' }}
        uses: actions/upload-artifact@v6
        with:
          name: rendering-audit-report
          path: test-results/
          retention-days: 7
